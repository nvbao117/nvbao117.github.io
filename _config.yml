theme: jekyll-theme-chirpy

lang: vi-VN
timezone: Asia/Ho_Chi_Minh

title: AI Engineer Blog
tagline: Ghi chép về AI Engineering, LLMOps và hệ thống AI thực chiến

description: >-
  Blog cá nhân của Nguyễn Vũ Bảo, chia sẻ về AI Engineer, LLM, RAG,
  AI Agents, deployment, evaluation và kinh nghiệm xây dựng sản phẩm AI.

url: "https://nvbao117.github.io"
baseurl: ""

github:
  username: nvbao117

twitter:
  username:

social:
  name: Nguyễn Vũ Bảo
  email: vubaonguyen2809@gmail.com
  links:
    - https://github.com/nvbao117

avatar: /assets/img/avatar-ai.svg

theme_mode: dual

comments:
  provider:

google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:
baidu_site_verification:

paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-sitemap

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

collections:
  tabs:
    output: true
    sort_by: order
  projects:
    output: true
    sort_by: order
    permalink: /projects/:name/

defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
      permalink: /posts/:title/
  -
    scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/
  -
    scope:
      path: _projects
      type: projects
    values:
      layout: page
      toc: true

sass:
  style: compressed

exclude:
  - README.md
  - LICENSE
  - Gemfile.lock
  - node_modules
  - vendor
  - scripts
  - "*.ps1"
  - "*.sh"
